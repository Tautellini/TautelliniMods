<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:#0a0806;}svg{display:block;}</style>
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="38%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#2e2517"/>
      <stop offset="55%" stop-color="#171208"/>
      <stop offset="100%" stop-color="#080604"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d89c"/>
      <stop offset="45%" stop-color="#d4b06a"/>
      <stop offset="100%" stop-color="#9a763c"/>
    </linearGradient>
    <linearGradient id="bronzeBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a7448"/>
      <stop offset="45%" stop-color="#5d4b29"/>
      <stop offset="100%" stop-color="#33270f"/>
    </linearGradient>
    <linearGradient id="shackle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8946a"/>
      <stop offset="50%" stop-color="#6e5b35"/>
      <stop offset="100%" stop-color="#42351c"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4b06a"/>
      <stop offset="70%" stop-color="#7a6234" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7a6234" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- faint diagonal scratches -->
  <g stroke="#c9ad72" stroke-opacity="0.05" stroke-width="2">
    <line x1="-100" y1="340" x2="900" y2="-60"/>
    <line x1="100" y1="1180" x2="1500" y2="240"/>
    <line x1="700" y1="1200" x2="2000" y2="500"/>
  </g>

  <!-- lock graphic, right side -->
  <g filter="url(#softShadow)">
    <!-- shackle -->
    <path d="M 1448 560 L 1448 440 C 1448 330 1652 330 1652 440 L 1652 560"
          fill="none" stroke="url(#shackle)" stroke-width="42" stroke-linecap="round"/>
    <!-- body -->
    <rect x="1370" y="548" width="360" height="316" rx="30" fill="url(#bronzeBody)"
          stroke="#241b0c" stroke-width="5"/>
    <!-- rivets -->
    <g fill="#3a2e16" stroke="#1c1408" stroke-width="2">
      <circle cx="1404" cy="582" r="9"/>
      <circle cx="1696" cy="582" r="9"/>
      <circle cx="1404" cy="830" r="9"/>
      <circle cx="1696" cy="830" r="9"/>
    </g>
    <!-- keyhole -->
    <g fill="#0c0905">
      <circle cx="1550" cy="668" r="36"/>
      <path d="M 1532 690 L 1518 790 L 1582 790 L 1568 690 Z"/>
    </g>
    <!-- lockpick entering the keyhole -->
    <g stroke-linecap="round">
      <line x1="1158" y1="912" x2="1538" y2="680" stroke="#d8d2c2" stroke-width="11"/>
      <line x1="1158" y1="912" x2="1262" y2="848" stroke="#6e6452" stroke-width="26"/>
    </g>
    <!-- tension wrench -->
    <line x1="1562" y1="700" x2="1600" y2="940" stroke="#b8b2a2" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- sparks at the keyhole -->
  <g fill="#f2d488" filter="url(#glow)">
    <path d="M 1512 640 l 5 -16 5 16 16 5 -16 5 -5 16 -5 -16 -16 -5 Z" opacity="0.95"/>
    <path d="M 1590 612 l 3.5 -11 3.5 11 11 3.5 -11 3.5 -3.5 11 -3.5 -11 -11 -3.5 Z" opacity="0.7"/>
    <path d="M 1486 720 l 2.5 -8 2.5 8 8 2.5 -8 2.5 -2.5 8 -2.5 -8 -8 -2.5 Z" opacity="0.55"/>
  </g>

  <!-- text block, left side -->
  <g font-family="Palatino Linotype, Georgia, serif">
    <text x="164" y="402" font-size="34" letter-spacing="9" fill="#8d7b54">A GOTHIC 1 REMAKE MOD</text>
    <text x="158" y="556" font-size="128" font-weight="bold" letter-spacing="2"
          fill="url(#gold)" filter="url(#softShadow)">LockpickSettings</text>
    <rect x="164" y="606" width="880" height="4" fill="url(#divider)"/>
    <text x="164" y="688" font-size="46" fill="#c2ad7e">More tries before your lockpick breaks.</text>
    <text x="164" y="748" font-size="34" fill="#776747">Configurable. No game files touched. Safe to add or remove anytime.</text>
  </g>

  <!-- tier strip -->
  <g font-family="Palatino Linotype, Georgia, serif" font-size="36" letter-spacing="3">
    <text x="164" y="960" fill="#9b8a60">UNTRAINED <tspan fill="#6d5d3c">2</tspan> <tspan fill="#d4b06a">&#8594; 12</tspan>
      <tspan fill="#574a2e" dx="26">&#9679;</tspan>
      <tspan dx="26">TRAINED <tspan fill="#6d5d3c">4</tspan> <tspan fill="#d4b06a">&#8594; 14</tspan></tspan>
      <tspan fill="#574a2e" dx="26">&#9679;</tspan>
      <tspan dx="26">MASTER <tspan fill="#6d5d3c">6</tspan> <tspan fill="#d4b06a">&#8594; 16</tspan></tspan>
    </text>
  </g>

  <!-- vignette on top -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
</body>
</html>
