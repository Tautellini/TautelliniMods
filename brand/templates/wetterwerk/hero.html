<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../house.css">
<link rel="stylesheet" href="../../themes/wetterwerk.css">
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   style="stop-color:var(--accent-hi)"/>
      <stop offset="0.5" style="stop-color:var(--accent)"/>
      <stop offset="1"   style="stop-color:var(--accent-lo)"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0"   style="stop-color:var(--accent);stop-opacity:0.20"/>
      <stop offset="0.6" style="stop-color:var(--accent);stop-opacity:0.06"/>
      <stop offset="1"   style="stop-color:var(--accent);stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- page -->
  <rect width="1920" height="1080" fill="var(--bg-0)"/>

  <!-- frame corner brackets (accent) -->
  <g class="s-acc" style="stroke-width:3;stroke-linecap:square">
    <path d="M56,120 L56,56 L120,56"/>
    <path d="M1800,56 L1864,56 L1864,120"/>
    <path d="M56,960 L56,1024 L120,1024"/>
    <path d="M1800,1024 L1864,1024 L1864,960"/>
  </g>

  <!-- eyebrow -->
  <text x="132" y="178" class="mono" font-size="30" letter-spacing="8">
    <tspan class="acc">[</tspan><tspan class="ink2"> GOTHIC 1 REMAKE </tspan><tspan class="acc">]</tspan>
  </text>

  <!-- title -->
  <text x="126" y="474" class="mono" font-size="104" font-weight="700" letter-spacing="-1">
    <tspan class="ink0">Wetter</tspan><tspan class="acc">werk</tspan>
  </text>
  <rect x="130" y="508" width="300" height="5" fill="url(#accentGrad)"/>

  <!-- subtitle -->
  <text x="132" y="598" class="sans ink1" font-size="46" font-weight="500">Command the weather over the Colony.</text>

  <!-- feature badges (text-bracket form) -->
  <text x="132" y="742" class="mono" font-size="28" letter-spacing="1">
    <tspan class="acc">[</tspan><tspan class="ink1"> WEATHER CONTROL </tspan><tspan class="acc">]</tspan>
    <tspan class="ink2" dx="22">  </tspan>
    <tspan class="acc">[</tspan><tspan class="ink1"> PRESETS </tspan><tspan class="acc">]</tspan>
    <tspan class="ink2" dx="22">  </tspan>
    <tspan class="acc">[</tspan><tspan class="ink1"> EVERY VALUE EXPOSED </tspan><tspan class="acc">]</tspan>
  </text>

  <!-- ===== sun + cloud + rain, right (no border, prominent) ===== -->
  <g transform="translate(40,-40)">
    <!-- glow behind the scene -->
    <circle cx="1500" cy="520" r="320" fill="url(#glowGrad)"/>

    <!-- sun, peeking behind the cloud (drawn first so the cloud overlaps it) -->
    <g transform="translate(1410,430)">
      <g stroke="url(#accentGrad)" stroke-width="7" stroke-linecap="round">
        <line x1="0"    y1="-118" x2="0"    y2="-150"/>
        <line x1="83"   y1="-83"  x2="106"  y2="-106"/>
        <line x1="118"  y1="0"    x2="150"  y2="0"/>
        <line x1="83"   y1="83"   x2="106"  y2="106"/>
        <line x1="-83"  y1="83"   x2="-106" y2="106"/>
        <line x1="-118" y1="0"    x2="-150" y2="0"/>
        <line x1="-83"  y1="-83"  x2="-106" y2="-106"/>
        <line x1="0"    y1="118"  x2="0"    y2="150"/>
      </g>
      <circle cx="0" cy="0" r="84" fill="url(#accentGrad)" filter="url(#softGlow)"/>
      <circle cx="0" cy="0" r="84" fill="none" stroke="var(--accent-hi)" stroke-width="2" stroke-opacity="0.5"/>
    </g>

    <!-- cloud (known silhouette path, 24-wide unit box, flat-ish bottom y=20) -->
    <g transform="translate(1296,470) scale(18)">
      <path d="M19.35,10.04 C18.67,6.59 15.64,4 12,4 C9.11,4 6.6,5.64 5.35,8.04
               C2.34,8.36 0,10.91 0,14 C0,17.31 2.69,20 6,20 L19,20
               C21.76,20 24,17.76 24,15 C24,12.36 21.95,10.22 19.35,10.04 Z"
            fill="var(--bg-2)" stroke="var(--accent)" stroke-width="0.22" stroke-linejoin="round"/>
    </g>

    <!-- rain streaks below the cloud -->
    <g stroke="url(#accentGrad)" stroke-width="7" stroke-linecap="round">
      <line x1="1360" y1="852" x2="1338" y2="912"/>
      <line x1="1430" y1="852" x2="1408" y2="912"/>
      <line x1="1500" y1="852" x2="1478" y2="912"/>
      <line x1="1570" y1="852" x2="1548" y2="912"/>
      <line x1="1640" y1="852" x2="1618" y2="912"/>
    </g>

    <!-- accent glint near the sun -->
    <g fill="var(--accent-hi)" filter="url(#softGlow)">
      <path d="M1300,360 l5,-15 5,15 15,5 -15,5 -5,15 -5,-15 -15,-5 Z" opacity="0.9"/>
    </g>
  </g>

  <!-- status band -->
  <text x="132" y="998" class="mono" font-size="28" letter-spacing="1">
    <tspan class="ink2">[ ultra dynamic sky </tspan><tspan class="acc">&#183;</tspan>
    <tspan class="ink2"> presets </tspan><tspan class="acc">&#183;</tspan>
    <tspan class="ink2"> every value exposed </tspan><tspan class="acc">&#183;</tspan>
    <tspan class="ink2"> save-safe ]</tspan>
  </text>
</svg>
</body>
</html>
