<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../house.css">
<link rel="stylesheet" href="../../themes/wetterwerk.css">
</head>
<body>
<svg width="960" height="180" viewBox="0 0 960 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="180" fill="var(--bg-0)"/>

  <!-- positive badge (accent end-brackets) -->
  <g transform="translate(40,58)">
    <rect x="0" y="0" width="232" height="64" fill="var(--bg-1)" class="s-line" style="stroke-width:1"/>
    <g class="s-acc" style="stroke-width:2.5;stroke-linecap:square">
      <path d="M0,18 L0,0 L18,0"/><path d="M0,46 L0,64 L18,64"/>
      <path d="M214,0 L232,0 L232,18"/><path d="M232,46 L232,64 L214,64"/>
    </g>
    <text x="116" y="41" class="mono acc" font-size="26" font-weight="700" text-anchor="middle">SAVE-SAFE</text>
  </g>

  <!-- neutral fact badge (hairline end-brackets) -->
  <g transform="translate(312,58)">
    <rect x="0" y="0" width="288" height="64" fill="var(--bg-1)" class="s-line" style="stroke-width:1"/>
    <g class="s-line2" style="stroke-width:2.5;stroke-linecap:square">
      <path d="M0,18 L0,0 L18,0"/><path d="M0,46 L0,64 L18,64"/>
      <path d="M270,0 L288,0 L288,18"/><path d="M288,46 L288,64 L270,64"/>
    </g>
    <text x="144" y="41" class="mono ink1" font-size="26" text-anchor="middle">NO FILE PATCHES</text>
  </g>

  <!-- neutral fact badge -->
  <g transform="translate(640,58)">
    <rect x="0" y="0" width="280" height="64" fill="var(--bg-1)" class="s-line" style="stroke-width:1"/>
    <g class="s-line2" style="stroke-width:2.5;stroke-linecap:square">
      <path d="M0,18 L0,0 L18,0"/><path d="M0,46 L0,64 L18,64"/>
      <path d="M262,0 L280,0 L280,18"/><path d="M280,46 L280,64 L262,64"/>
    </g>
    <text x="140" y="41" class="mono ink1" font-size="24" text-anchor="middle">READS + RESTORES</text>
  </g>
</svg>
</body>
</html>
