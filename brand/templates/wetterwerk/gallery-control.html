<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../house.css">
<link rel="stylesheet" href="../../themes/wetterwerk.css">
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   style="stop-color:var(--accent-hi)"/>
      <stop offset="0.5" style="stop-color:var(--accent)"/>
      <stop offset="1"   style="stop-color:var(--accent-lo)"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0"   style="stop-color:var(--accent);stop-opacity:0.18"/>
      <stop offset="0.6" style="stop-color:var(--accent);stop-opacity:0.05"/>
      <stop offset="1"   style="stop-color:var(--accent);stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="var(--bg-0)"/>

  <!-- frame corner brackets (accent) -->
  <g class="s-acc" style="stroke-width:3;stroke-linecap:square">
    <path d="M56,120 L56,56 L120,56"/>
    <path d="M1800,56 L1864,56 L1864,120"/>
    <path d="M56,960 L56,1024 L120,1024"/>
    <path d="M1800,1024 L1864,1024 L1864,960"/>
  </g>

  <!-- eyebrow (hidden when ?eyebrow=0, for the in-description variant) -->
  <text id="eyebrow" x="132" y="180" class="mono" font-size="30" letter-spacing="8">
    <tspan class="acc">[</tspan><tspan class="ink2"> WETTERWERK </tspan><tspan class="acc">]</tspan>
  </text>

  <g id="content">
  <!-- title -->
  <text x="126" y="372" class="mono ink0" font-size="72" font-weight="700">WEATHER CONTROL</text>
  <rect x="130" y="404" width="260" height="5" fill="var(--accent)"/>

  <!-- copy -->
  <text x="132" y="480" class="sans ink1" font-size="42" font-weight="500">Set the sky on command.</text>

  <!-- PREV / NEXT: step through the weather states -->
  <rect x="132" y="548" width="210" height="66" fill="var(--bg-1)" class="s-line" style="stroke-width:2"/>
  <rect x="136" y="552" width="202" height="4" fill="var(--accent)" fill-opacity="0.5"/>
  <text x="237" y="596" class="mono acc" font-size="30" font-weight="700" text-anchor="middle">PREV / NEXT</text>
  <text x="380" y="580" class="sans ink1" font-size="30">Step through the weather states.</text>
  <text x="380" y="608" class="mono ink2" font-size="22">sunny, overcast, rain, storm, fog</text>

  <!-- PRESETS: a button per weather -->
  <rect x="132" y="664" width="210" height="66" fill="var(--bg-1)" class="s-line" style="stroke-width:2"/>
  <rect x="136" y="668" width="202" height="4" fill="var(--accent)" fill-opacity="0.5"/>
  <text x="237" y="710" class="mono acc" font-size="32" font-weight="700" text-anchor="middle">PRESETS</text>
  <text x="380" y="696" class="sans ink1" font-size="30">A button per weather, click to set.</text>
  <text x="380" y="724" class="mono ink2" font-size="22">jump straight to any condition</text>

  <!-- HOLD: freeze the current weather -->
  <rect x="132" y="784" width="210" height="66" fill="var(--bg-1)" class="s-line" style="stroke-width:2"/>
  <rect x="136" y="788" width="202" height="4" fill="var(--accent)" fill-opacity="0.5"/>
  <text x="237" y="830" class="mono acc" font-size="34" font-weight="700" text-anchor="middle">HOLD</text>
  <text x="380" y="816" class="sans ink1" font-size="30">Freeze the current weather.</text>
  <text x="380" y="844" class="mono ink2" font-size="22">stops the game's dynamic cycle</text>

  <!-- READS + RESTORES reassurance -->
  <g transform="translate(132,896)">
    <rect x="0" y="0" width="588" height="84" rx="14" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="3"/>
    <path d="M36,42 L56,62 L88,26" fill="none" stroke="url(#accentGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
    <text x="120" y="55" class="mono ink0" font-size="40" font-weight="700" letter-spacing="1">READS + RESTORES</text>
  </g>
  </g>

  <g id="visual">
  <!-- ===== sun + cloud + rain, right ===== -->
  <circle cx="1480" cy="500" r="300" fill="url(#glowGrad)"/>

  <!-- sun, peeking behind the cloud -->
  <g transform="translate(1392,408)">
    <g stroke="url(#accentGrad)" stroke-width="7" stroke-linecap="round">
      <line x1="0"    y1="-118" x2="0"    y2="-150"/>
      <line x1="83"   y1="-83"  x2="106"  y2="-106"/>
      <line x1="118"  y1="0"    x2="150"  y2="0"/>
      <line x1="83"   y1="83"   x2="106"  y2="106"/>
      <line x1="-83"  y1="83"   x2="-106" y2="106"/>
      <line x1="-118" y1="0"    x2="-150" y2="0"/>
      <line x1="-83"  y1="-83"  x2="-106" y2="-106"/>
      <line x1="0"    y1="118"  x2="0"    y2="150"/>
    </g>
    <circle cx="0" cy="0" r="84" fill="url(#accentGrad)" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="84" fill="none" stroke="var(--accent-hi)" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <!-- cloud -->
  <g transform="translate(1278,448) scale(18)">
    <path d="M19.35,10.04 C18.67,6.59 15.64,4 12,4 C9.11,4 6.6,5.64 5.35,8.04
             C2.34,8.36 0,10.91 0,14 C0,17.31 2.69,20 6,20 L19,20
             C21.76,20 24,17.76 24,15 C24,12.36 21.95,10.22 19.35,10.04 Z"
          fill="var(--bg-2)" stroke="var(--accent)" stroke-width="0.22" stroke-linejoin="round"/>
  </g>

  <!-- rain streaks below the cloud -->
  <g stroke="url(#accentGrad)" stroke-width="7" stroke-linecap="round">
    <line x1="1342" y1="830" x2="1320" y2="890"/>
    <line x1="1412" y1="830" x2="1390" y2="890"/>
    <line x1="1482" y1="830" x2="1460" y2="890"/>
    <line x1="1552" y1="830" x2="1530" y2="890"/>
    <line x1="1622" y1="830" x2="1600" y2="890"/>
  </g>

  <!-- accent glints -->
  <g fill="var(--accent-hi)" filter="url(#softGlow)">
    <path d="M1282,338 l5,-15 5,15 15,5 -15,5 -5,15 -5,-15 -15,-5 Z" opacity="0.9"/>
    <path d="M1612,372 l4,-12 4,12 12,4 -12,4 -4,12 -4,-12 -12,-4 Z" opacity="0.8"/>
  </g>
  </g>
</svg>
<script>
  var p = new URLSearchParams(location.search);
  // eyebrow-less variant for embedding in the description body
  if (p.get('eyebrow') === '0') {
    var e = document.getElementById('eyebrow'); if (e) e.style.display = 'none';
  }
  // inverted variant: graphic to the left, text block to the right
  if (p.get('invert') === '1') {
    var c = document.getElementById('content'); if (c) c.setAttribute('transform', 'translate(840,0)');
    var v = document.getElementById('visual');  if (v) v.setAttribute('transform', 'translate(-900,0)');
  }
</script>
</body>
</html>
