<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../house.css">
<link rel="stylesheet" href="../../themes/wetterwerk.css">
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   style="stop-color:var(--accent-hi)"/>
      <stop offset="0.5" style="stop-color:var(--accent)"/>
      <stop offset="1"   style="stop-color:var(--accent-lo)"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0"   style="stop-color:var(--accent);stop-opacity:0.18"/>
      <stop offset="0.6" style="stop-color:var(--accent);stop-opacity:0.05"/>
      <stop offset="1"   style="stop-color:var(--accent);stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="var(--bg-0)"/>

  <!-- frame corner brackets (accent) -->
  <g class="s-acc" style="stroke-width:3;stroke-linecap:square">
    <path d="M56,120 L56,56 L120,56"/>
    <path d="M1800,56 L1864,56 L1864,120"/>
    <path d="M56,960 L56,1024 L120,1024"/>
    <path d="M1800,1024 L1864,1024 L1864,960"/>
  </g>

  <!-- eyebrow -->
  <text id="eyebrow" x="132" y="180" class="mono" font-size="30" letter-spacing="8">
    <tspan class="acc">[</tspan><tspan class="ink2"> WETTERWERK </tspan><tspan class="acc">]</tspan>
  </text>

  <g id="content">
  <!-- title -->
  <text x="126" y="372" class="mono ink0" font-size="72" font-weight="700">SAFE TO USE</text>
  <rect x="130" y="404" width="260" height="5" fill="var(--accent)"/>

  <!-- bullet lines -->
  <g>
    <rect x="134" y="466" width="14" height="14" fill="var(--accent)"/>
    <text x="170" y="480" class="sans ink1" font-size="32">No game files are modified. Pure UE4SS Lua.</text>

    <rect x="134" y="556" width="14" height="14" fill="var(--accent)"/>
    <text x="170" y="570" class="sans ink1" font-size="32">It drives the game's own Ultra Dynamic Sky</text>
    <text x="170" y="612" class="sans ink1" font-size="32">controller through its public functions, nothing patched.</text>

    <rect x="134" y="686" width="14" height="14" fill="var(--accent)"/>
    <text x="170" y="700" class="sans ink1" font-size="32">It reads the current weather first, so it can put it back.</text>

    <rect x="134" y="776" width="14" height="14" fill="var(--accent)"/>
    <text x="170" y="790" class="sans ink1" font-size="32">Unload the mod or quit and the game's own</text>
    <text x="170" y="832" class="sans ink1" font-size="32">weather cycle resumes.</text>
  </g>
  </g>

  <g id="visual">
  <!-- ===== shield + check, right ===== -->
  <circle cx="1480" cy="520" r="280" fill="url(#glowGrad)"/>

  <g transform="translate(1480,520)">
    <!-- shield -->
    <path d="M0,-210 L156,-156 L156,44 C156,150 84,212 0,250 C-84,212 -156,150 -156,44 L-156,-156 Z"
          fill="var(--bg-2)" stroke="var(--accent)" stroke-width="4" stroke-linejoin="round"/>
    <path d="M0,-178 L128,-134 L128,40 C128,128 70,180 0,214 C-70,180 -128,128 -128,40 L-128,-134 Z"
          fill="none" stroke="var(--accent)" stroke-opacity="0.22" stroke-width="2" stroke-linejoin="round"/>
    <!-- check -->
    <path d="M-72,6 L-14,68 L86,-66" fill="none" stroke="url(#accentGrad)" stroke-width="20"
          stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  </g>

  <!-- small weather glints around the shield -->
  <g fill="var(--accent-hi)" filter="url(#softGlow)">
    <path d="M1280,330 l5,-16 5,16 16,5 -16,5 -5,16 -5,-16 -16,-5 Z"/>
    <path d="M1690,360 l4,-12 4,12 12,4 -12,4 -4,12 -4,-12 -12,-4 Z" opacity="0.85"/>
    <path d="M1700,640 l4,-13 4,13 13,4 -13,4 -4,13 -4,-13 -13,-4 Z" opacity="0.9"/>
  </g>
  </g>
</svg>
<script>
  var p = new URLSearchParams(location.search);
  if (p.get('eyebrow') === '0') {
    var e = document.getElementById('eyebrow'); if (e) e.style.display = 'none';
  }
  if (p.get('invert') === '1') {
    var c = document.getElementById('content'); if (c) c.setAttribute('transform', 'translate(840,0)');
    var v = document.getElementById('visual');  if (v) v.setAttribute('transform', 'translate(-900,0)');
  }
</script>
</body>
</html>
