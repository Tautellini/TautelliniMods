<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../house.css">
<link rel="stylesheet" href="../themes/g1r.css">
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   style="stop-color:var(--accent-hi)"/>
      <stop offset="0.5" style="stop-color:var(--accent)"/>
      <stop offset="1"   style="stop-color:var(--accent-lo)"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0"   style="stop-color:var(--accent);stop-opacity:0.20"/>
      <stop offset="0.6" style="stop-color:var(--accent);stop-opacity:0.06"/>
      <stop offset="1"   style="stop-color:var(--accent);stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="var(--bg-0)"/>

  <!-- frame corner brackets (accent) -->
  <g class="s-acc" style="stroke-width:3;stroke-linecap:square">
    <path d="M56,120 L56,56 L120,56"/>
    <path d="M1800,56 L1864,56 L1864,120"/>
    <path d="M56,960 L56,1024 L120,1024"/>
    <path d="M1800,1024 L1864,1024 L1864,960"/>
  </g>

  <!-- eyebrow (hidden when ?eyebrow=0, for the in-description variant) -->
  <text id="eyebrow" x="132" y="180" class="mono" font-size="30" letter-spacing="8">
    <tspan class="acc">[</tspan><tspan class="ink2"> LOCKPICKSETTINGS </tspan><tspan class="acc">]</tspan>
  </text>

  <!-- title -->
  <text x="126" y="372" class="mono ink0" font-size="72" font-weight="700">SAFE TO USE</text>
  <rect x="130" y="404" width="260" height="5" fill="var(--accent)"/>

  <!-- safety checklist -->
  <g class="s-acc" style="stroke-width:5;stroke-linecap:round;stroke-linejoin:round">
    <path d="M134,497 L145,509 L167,483"/>
    <path d="M134,567 L145,579 L167,553"/>
    <path d="M134,637 L145,649 L167,623"/>
    <path d="M134,707 L145,719 L167,693"/>
  </g>
  <text x="190" y="504" class="sans" font-size="30"><tspan class="acc" font-weight="700">Achievements keep unlocking</tspan><tspan class="ink1">, every one.</tspan></text>
  <text x="190" y="574" class="sans ink1" font-size="30">No game files touched, nothing patched on disk.</text>
  <text x="190" y="644" class="sans ink1" font-size="30">The tries boost never persists in your saves.</text>
  <text x="190" y="714" class="sans ink1" font-size="30">Add or remove anytime. Everything returns to vanilla.</text>

  <!-- ===== shield, right (no border, prominent) ===== -->
  <g transform="translate(-561,-155) scale(1.4)">
    <!-- glow -->
    <circle cx="1422" cy="500" r="215" fill="url(#glowGrad)"/>
    <!-- shield -->
    <g fill="none" stroke-linejoin="round">
      <path d="M1302,366 C1302,354 1311,346 1323,346 L1521,346 C1533,346 1542,354 1542,366 L1542,498 C1542,582 1488,632 1422,656 C1356,632 1302,582 1302,498 Z"
            fill="var(--bg-2)" stroke="var(--accent)" stroke-width="3"/>
      <path d="M1316,372 C1316,362 1323,356 1333,356 L1511,356 C1521,356 1528,362 1528,372 L1528,496 C1528,572 1480,618 1422,640 C1364,618 1316,572 1316,496 Z"
            stroke="var(--accent)" stroke-opacity="0.25" stroke-width="2"/>
    </g>
    <!-- checkmark -->
    <path d="M1378,484 L1414,524 L1488,430" fill="none" stroke="url(#accentGrad)"
          stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  </g>

  <!-- caption -->
  <text x="1430" y="862" class="mono acc" font-size="28" text-anchor="middle" letter-spacing="3" font-weight="700">ACHIEVEMENTS INTACT</text>
</svg>
<script>
  // eyebrow-less variant for embedding in the description body
  if (new URLSearchParams(location.search).get('eyebrow') === '0') {
    var e = document.getElementById('eyebrow'); if (e) e.style.display = 'none';
  }
</script>
</body>
</html>
