<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../house.css">
<link rel="stylesheet" href="../themes/g1r.css">
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   style="stop-color:var(--accent-hi)"/>
      <stop offset="0.5" style="stop-color:var(--accent)"/>
      <stop offset="1"   style="stop-color:var(--accent-lo)"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0"   style="stop-color:var(--accent);stop-opacity:0.16"/>
      <stop offset="0.6" style="stop-color:var(--accent);stop-opacity:0.05"/>
      <stop offset="1"   style="stop-color:var(--accent);stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="var(--bg-0)"/>

  <!-- frame corner brackets (accent) -->
  <g class="s-acc" style="stroke-width:3;stroke-linecap:square">
    <path d="M56,120 L56,56 L120,56"/>
    <path d="M1800,56 L1864,56 L1864,120"/>
    <path d="M56,960 L56,1024 L120,1024"/>
    <path d="M1800,1024 L1864,1024 L1864,960"/>
  </g>

  <!-- eyebrow (hidden when ?eyebrow=0, for the in-description variant) -->
  <text id="eyebrow" x="132" y="180" class="mono" font-size="30" letter-spacing="8">
    <tspan class="acc">[</tspan><tspan class="ink2"> LOCKPICKSETTINGS </tspan><tspan class="acc">]</tspan>
  </text>

  <g id="content">
  <!-- title -->
  <text x="126" y="372" class="mono ink0" font-size="72" font-weight="700">MORE TRIES</text>
  <rect x="130" y="404" width="260" height="5" fill="var(--accent)"/>

  <!-- copy -->
  <text x="132" y="472" class="sans ink1" font-size="42" font-weight="500">More moves before your pick breaks.</text>
  <text x="132" y="540" class="sans ink2" font-size="28">Durability climbs by <tspan class="acc" font-weight="700">+10</tspan> at every Picklock</text>
  <text x="132" y="576" class="sans ink2" font-size="28">tier, so leveling the skill still pays off.</text>

  </g>

  <g id="visual">
  <!-- ===== before/after bar chart, right (no border) ===== -->
  <!-- glow -->
  <circle cx="1470" cy="500" r="300" fill="url(#glowGrad)"/>

  <!-- bars -->
  <g>
    <!-- Untrained -->
    <rect x="1157" y="675" width="52" height="45"  fill="var(--bg-2)" class="s-line2" style="stroke-width:1.5"/>
    <rect x="1227" y="450" width="52" height="270" fill="url(#accentGrad)"/>
    <text x="1183" y="661" class="mono ink2" font-size="26" text-anchor="middle">2</text>
    <text x="1253" y="434" class="mono acc"  font-size="30" text-anchor="middle" font-weight="700">12</text>
    <!-- Trained -->
    <rect x="1389" y="630" width="52" height="90"  fill="var(--bg-2)" class="s-line2" style="stroke-width:1.5"/>
    <rect x="1459" y="405" width="52" height="315" fill="url(#accentGrad)"/>
    <text x="1415" y="616" class="mono ink2" font-size="26" text-anchor="middle">4</text>
    <text x="1485" y="389" class="mono acc"  font-size="30" text-anchor="middle" font-weight="700">14</text>
    <!-- Master -->
    <rect x="1621" y="585" width="52" height="135" fill="var(--bg-2)" class="s-line2" style="stroke-width:1.5"/>
    <rect x="1691" y="360" width="52" height="360" fill="url(#accentGrad)"/>
    <text x="1647" y="571" class="mono ink2" font-size="26" text-anchor="middle">6</text>
    <text x="1717" y="344" class="mono acc"  font-size="30" text-anchor="middle" font-weight="700">16</text>
  </g>

  <!-- baseline -->
  <rect x="1130" y="720" width="640" height="2" fill="var(--hairline-2)"/>

  <!-- tier labels -->
  <g class="mono ink2" font-size="22" text-anchor="middle" letter-spacing="1">
    <text x="1218" y="754">UNTRAINED</text>
    <text x="1450" y="754">TRAINED</text>
    <text x="1682" y="754">MASTER</text>
  </g>
  </g>
</svg>
<script>
  var p = new URLSearchParams(location.search);
  // eyebrow-less variant for embedding in the description body
  if (p.get('eyebrow') === '0') {
    var e = document.getElementById('eyebrow'); if (e) e.style.display = 'none';
  }
  // inverted variant: graphic to the left, text block to the right
  if (p.get('invert') === '1') {
    var c = document.getElementById('content'); if (c) c.setAttribute('transform', 'translate(840,0)');
    var v = document.getElementById('visual');  if (v) v.setAttribute('transform', 'translate(-900,0)');
  }
</script>
</body>
</html>
