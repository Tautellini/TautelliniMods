<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../house.css">
<link rel="stylesheet" href="../themes/g1r.css">
</head>
<body>
<svg width="1300" height="372" viewBox="0 0 1300 372" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   style="stop-color:var(--accent-hi)"/>
      <stop offset="0.5" style="stop-color:var(--accent)"/>
      <stop offset="1"   style="stop-color:var(--accent-lo)"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0"   style="stop-color:var(--accent);stop-opacity:0.20"/>
      <stop offset="0.6" style="stop-color:var(--accent);stop-opacity:0.06"/>
      <stop offset="1"   style="stop-color:var(--accent);stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1300" height="372" fill="var(--bg-0)"/>

  <!-- subtle corner frame (hairline) -->
  <g class="s-line" style="stroke-width:2;stroke-linecap:square">
    <path d="M28,58 L28,28 L58,28"/>
    <path d="M1242,28 L1272,28 L1272,58"/>
    <path d="M28,314 L28,344 L58,344"/>
    <path d="M1242,344 L1272,344 L1272,314"/>
  </g>

  <!-- ===== the same lock + pick as the hero, scaled to the right, vertically centered ===== -->
  <g transform="translate(-204,-274) scale(0.82)">
    <!-- glow behind the lock -->
    <circle cx="1554" cy="585" r="215" fill="url(#glowGrad)"/>
    <!-- padlock -->
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1501,528 L1501,461 A53,53 0 0 1 1607,461 L1607,528" stroke="url(#accentGrad)" stroke-width="15"/>
      <rect x="1454" y="520" width="200" height="174" rx="20" fill="var(--bg-2)" stroke="var(--accent)" stroke-width="3"/>
      <rect x="1466" y="532" width="176" height="150" rx="14" stroke="var(--accent)" stroke-opacity="0.25" stroke-width="2"/>
      <circle cx="1554" cy="590" r="20" fill="var(--bg-0)" stroke="var(--accent)" stroke-width="2.5"/>
      <path d="M1542,606 L1535,658 L1573,658 L1566,606 Z" fill="var(--bg-0)" stroke="var(--accent)" stroke-width="2.5"/>
    </g>
    <!-- lockpick + tension wrench -->
    <g fill="none" stroke-linecap="round">
      <line x1="1350" y1="714" x2="1408" y2="682" stroke="var(--ink-2)" stroke-width="16"/>
      <line x1="1400" y1="686" x2="1548" y2="594" stroke="var(--ink-1)" stroke-width="6"/>
      <path d="M1560,614 L1566,674 L1606,692" stroke="var(--ink-1)" stroke-width="6"/>
    </g>
    <!-- accent glint at the keyhole -->
    <g fill="var(--accent-hi)" filter="url(#softGlow)">
      <path d="M1510,556 l4,-13 4,13 13,4 -13,4 -4,13 -4,-13 -13,-4 Z" opacity="0.9"/>
    </g>
  </g>

  <!-- ===== brand block, top-left (the focus) ===== -->
  <text x="64" y="74" class="mono" font-size="18" letter-spacing="6">
    <tspan class="acc">[</tspan><tspan class="ink2"> GOTHIC 1 REMAKE </tspan><tspan class="acc">]</tspan>
  </text>

  <text x="60" y="152" class="mono" font-size="54" font-weight="700" letter-spacing="-1">
    <tspan class="ink0">Lockpick</tspan><tspan class="acc">Settings</tspan>
  </text>
  <rect x="64" y="176" width="170" height="4" fill="var(--accent)"/>

  <text x="64" y="220" class="sans ink1" font-size="24" font-weight="500">Your toolbox for the lockpicking minigame.</text>
</svg>
</body>
</html>
