<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../house.css">
<link rel="stylesheet" href="../themes/g1r.css">
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   style="stop-color:var(--accent-hi)"/>
      <stop offset="0.5" style="stop-color:var(--accent)"/>
      <stop offset="1"   style="stop-color:var(--accent-lo)"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0"   style="stop-color:var(--accent);stop-opacity:0.20"/>
      <stop offset="0.6" style="stop-color:var(--accent);stop-opacity:0.06"/>
      <stop offset="1"   style="stop-color:var(--accent);stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- page -->
  <rect width="1920" height="1080" fill="var(--bg-0)"/>

  <!-- frame corner brackets (accent) -->
  <g class="s-acc" style="stroke-width:3;stroke-linecap:square">
    <path d="M56,120 L56,56 L120,56"/>
    <path d="M1800,56 L1864,56 L1864,120"/>
    <path d="M56,960 L56,1024 L120,1024"/>
    <path d="M1800,1024 L1864,1024 L1864,960"/>
  </g>

  <!-- eyebrow -->
  <text x="132" y="150" class="mono" font-size="30" letter-spacing="8">
    <tspan class="acc">[</tspan><tspan class="ink2"> GOTHIC 1 REMAKE </tspan><tspan class="acc">]</tspan>
  </text>

  <!-- title (bigger, for the small browse thumbnail) -->
  <text x="126" y="312" class="mono" font-size="124" font-weight="700" letter-spacing="-1">
    <tspan class="ink0">Lockpick</tspan><tspan class="acc">Settings</tspan>
  </text>
  <rect x="130" y="348" width="372" height="6" fill="url(#accentGrad)"/>

  <!-- subtitle -->
  <text x="132" y="428" class="sans ink1" font-size="44" font-weight="500">Your toolbox for the lockpicking minigame.</text>

  <!-- ===== lock + pick, upper right ===== -->
  <g transform="translate(40,-300) scale(1.0)">
    <circle cx="1554" cy="585" r="215" fill="url(#glowGrad)"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1501,528 L1501,461 A53,53 0 0 1 1607,461 L1607,528" stroke="url(#accentGrad)" stroke-width="15"/>
      <rect x="1454" y="520" width="200" height="174" rx="20" fill="var(--bg-2)" stroke="var(--accent)" stroke-width="3"/>
      <rect x="1466" y="532" width="176" height="150" rx="14" stroke="var(--accent)" stroke-opacity="0.25" stroke-width="2"/>
      <circle cx="1554" cy="590" r="20" fill="var(--bg-0)" stroke="var(--accent)" stroke-width="2.5"/>
      <path d="M1542,606 L1535,658 L1573,658 L1566,606 Z" fill="var(--bg-0)" stroke="var(--accent)" stroke-width="2.5"/>
    </g>
    <g fill="none" stroke-linecap="round">
      <line x1="1350" y1="714" x2="1408" y2="682" stroke="var(--ink-2)" stroke-width="16"/>
      <line x1="1400" y1="686" x2="1548" y2="594" stroke="var(--ink-1)" stroke-width="6"/>
      <path d="M1560,614 L1566,674 L1606,692" stroke="var(--ink-1)" stroke-width="6"/>
    </g>
    <g fill="var(--accent-hi)" filter="url(#softGlow)">
      <path d="M1510,556 l4,-13 4,13 13,4 -13,4 -4,13 -4,-13 -13,-4 Z" opacity="0.9"/>
    </g>
  </g>

  <!-- ===== three big feature cards (two-line labels, large for the thumbnail) ===== -->
  <!-- card 1: HIGHLIGHT MOVES (sparkle) -->
  <g transform="translate(96,0)">
    <path d="M0,530 L532,530 L552,550 L552,850 L20,850 L0,830 Z" fill="var(--bg-2)" class="s-line2" style="stroke-width:1.5"/>
    <g class="s-acc" style="stroke-width:2.5;stroke-linecap:square">
      <path d="M0,564 L0,530 L34,530"/>
      <path d="M518,850 L552,850 L552,816"/>
    </g>
    <path d="M276,548 L287,581 L320,592 L287,603 L276,636 L265,603 L232,592 L265,581 Z"
          fill="var(--accent)" filter="url(#softGlow)"/>
    <text x="276" y="735" class="mono ink0" font-size="72" font-weight="700" text-anchor="middle">HIGHLIGHT</text>
    <text x="276" y="810" class="mono ink0" font-size="72" font-weight="700" text-anchor="middle">MOVES</text>
  </g>
  <!-- card 2: INSTANT AUTO-SOLVE (checkmark in a circle) -->
  <g transform="translate(684,0)">
    <path d="M0,530 L532,530 L552,550 L552,850 L20,850 L0,830 Z" fill="var(--bg-2)" class="s-line2" style="stroke-width:1.5"/>
    <g class="s-acc" style="stroke-width:2.5;stroke-linecap:square">
      <path d="M0,564 L0,530 L34,530"/>
      <path d="M518,850 L552,850 L552,816"/>
    </g>
    <g fill="none" stroke="var(--accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="276" cy="592" r="38"/>
      <path d="M258,593 L271,606 L296,578"/>
    </g>
    <text x="276" y="735" class="mono ink0" font-size="72" font-weight="700" text-anchor="middle">INSTANT</text>
    <text x="276" y="810" class="mono ink0" font-size="60" font-weight="700" text-anchor="middle">AUTO-SOLVE</text>
  </g>
  <!-- ACHIEVEMENT SAFE badge under the auto-solve card -->
  <g transform="translate(690,876)">
    <rect x="0" y="0" width="540" height="76" rx="13" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="3"/>
    <path d="M34,40 L52,58 L82,24" fill="none" stroke="url(#accentGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
    <text x="112" y="52" class="mono ink0" font-size="40" font-weight="700" letter-spacing="1">ACHIEVEMENT SAFE</text>
  </g>
  <!-- card 3: ADJUST SETTINGS (sliders) -->
  <g transform="translate(1272,0)">
    <path d="M0,530 L532,530 L552,550 L552,850 L20,850 L0,830 Z" fill="var(--bg-2)" class="s-line2" style="stroke-width:1.5"/>
    <g class="s-acc" style="stroke-width:2.5;stroke-linecap:square">
      <path d="M0,564 L0,530 L34,530"/>
      <path d="M518,850 L552,850 L552,816"/>
    </g>
    <g stroke="var(--accent)" stroke-width="6" stroke-linecap="round">
      <line x1="234" y1="570" x2="318" y2="570"/>
      <line x1="234" y1="592" x2="318" y2="592"/>
      <line x1="234" y1="614" x2="318" y2="614"/>
    </g>
    <g fill="var(--accent)" stroke="var(--bg-2)" stroke-width="3">
      <circle cx="262" cy="570" r="10"/>
      <circle cx="296" cy="592" r="10"/>
      <circle cx="250" cy="614" r="10"/>
    </g>
    <text x="276" y="735" class="mono ink0" font-size="72" font-weight="700" text-anchor="middle">ADJUST</text>
    <text x="276" y="810" class="mono ink0" font-size="72" font-weight="700" text-anchor="middle">SETTINGS</text>
  </g>

</svg>
</body>
</html>
