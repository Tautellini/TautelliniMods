<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../house.css">
<link rel="stylesheet" href="../themes/g1r.css">
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   style="stop-color:var(--accent-hi)"/>
      <stop offset="0.5" style="stop-color:var(--accent)"/>
      <stop offset="1"   style="stop-color:var(--accent-lo)"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0"   style="stop-color:var(--accent);stop-opacity:0.18"/>
      <stop offset="0.6" style="stop-color:var(--accent);stop-opacity:0.05"/>
      <stop offset="1"   style="stop-color:var(--accent);stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="var(--bg-0)"/>

  <!-- frame corner brackets (accent) -->
  <g class="s-acc" style="stroke-width:3;stroke-linecap:square">
    <path d="M56,120 L56,56 L120,56"/>
    <path d="M1800,56 L1864,56 L1864,120"/>
    <path d="M56,960 L56,1024 L120,1024"/>
    <path d="M1800,1024 L1864,1024 L1864,960"/>
  </g>

  <!-- eyebrow (hidden when ?eyebrow=0, for the in-description variant) -->
  <text id="eyebrow" x="132" y="180" class="mono" font-size="30" letter-spacing="8">
    <tspan class="acc">[</tspan><tspan class="ink2"> LOCKPICKSETTINGS </tspan><tspan class="acc">]</tspan>
  </text>

  <g id="content">
  <!-- title -->
  <text x="126" y="372" class="mono ink0" font-size="72" font-weight="700">AUTO SOLVER</text>
  <rect x="130" y="404" width="260" height="5" fill="var(--accent)"/>

  <!-- copy -->
  <text x="132" y="480" class="sans ink1" font-size="42" font-weight="500">Hands-off lockpicking.</text>
  <text x="132" y="548" class="sans ink2" font-size="28">Trigger it once and the lock walks itself open,</text>
  <text x="132" y="584" class="sans ink2" font-size="28">piece by piece. No further input from you.</text>

  <!-- badge -->
  <text x="132" y="668" class="mono" font-size="26" letter-spacing="1">
    <tspan class="acc">[</tspan><tspan class="ink1"> ZERO MOVES </tspan><tspan class="acc">]</tspan>
    <tspan class="ink2" dx="20">  </tspan>
    <tspan class="acc">[</tspan><tspan class="ink1"> ONE KEYPRESS </tspan><tspan class="acc">]</tspan>
  </text>
  </g>

  <g id="visual">
  <!-- ===== auto-solved padlock, right ===== -->
  <circle cx="1420" cy="490" r="280" fill="url(#glowGrad)"/>
  <g transform="translate(-134,-100)">
    <!-- shackle -->
    <path d="M1501,528 L1501,461 A53,53 0 0 1 1607,461 L1607,528" fill="none"
          stroke="url(#accentGrad)" stroke-width="15" stroke-linecap="round"/>
    <!-- body -->
    <rect x="1454" y="520" width="200" height="174" rx="20" fill="var(--bg-2)" stroke="var(--accent)" stroke-width="3"/>
    <rect x="1466" y="532" width="176" height="150" rx="14" fill="none" stroke="var(--accent)" stroke-opacity="0.25" stroke-width="2"/>
    <!-- checkmark: the lock is already solved -->
    <path d="M1512,608 L1544,642 L1602,572" fill="none" stroke="url(#accentGrad)" stroke-width="16"
          stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  </g>
  <!-- sparkles: automatic, hands-free -->
  <g fill="var(--accent-hi)" filter="url(#softGlow)">
    <path d="M1290,330 l5,-16 5,16 16,5 -16,5 -5,16 -5,-16 -16,-5 Z"/>
    <path d="M1572,372 l4,-12 4,12 12,4 -12,4 -4,12 -4,-12 -12,-4 Z" opacity="0.85"/>
    <path d="M1300,566 l4,-13 4,13 13,4 -13,4 -4,13 -4,-13 -13,-4 Z" opacity="0.9"/>
  </g>
  </g>
</svg>
<script>
  var p = new URLSearchParams(location.search);
  // eyebrow-less variant for embedding in the description body
  if (p.get('eyebrow') === '0') {
    var e = document.getElementById('eyebrow'); if (e) e.style.display = 'none';
  }
  // inverted variant: graphic to the left, text block to the right
  if (p.get('invert') === '1') {
    var c = document.getElementById('content'); if (c) c.setAttribute('transform', 'translate(840,0)');
    var v = document.getElementById('visual');  if (v) v.setAttribute('transform', 'translate(-900,0)');
  }
</script>
</body>
</html>
