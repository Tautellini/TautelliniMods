<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../house.css">
<link rel="stylesheet" href="../themes/g1r.css">
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dangerGlow" cx="50%" cy="40%" r="58%">
      <stop offset="0"   style="stop-color:var(--danger);stop-opacity:0.18"/>
      <stop offset="0.6" style="stop-color:var(--danger);stop-opacity:0.05"/>
      <stop offset="1"   style="stop-color:var(--danger);stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="var(--bg-0)"/>
  <ellipse cx="960" cy="420" rx="940" ry="520" fill="url(#dangerGlow)"/>

  <!-- danger corner brackets (red instead of the usual accent) -->
  <g style="stroke:var(--danger);fill:none;stroke-width:4;stroke-linecap:square">
    <path d="M56,120 L56,56 L120,56"/>
    <path d="M1800,56 L1864,56 L1864,120"/>
    <path d="M56,960 L56,1024 L120,1024"/>
    <path d="M1800,1024 L1864,1024 L1864,960"/>
  </g>

  <!-- warning triangle -->
  <g transform="translate(960,196)" filter="url(#softGlow)">
    <path d="M0,-88 L98,82 L-98,82 Z" fill="none" stroke="var(--danger)" stroke-width="11" stroke-linejoin="round"/>
    <rect x="-9" y="-42" width="18" height="74" rx="6" fill="var(--danger)"/>
    <circle cx="0" cy="58" r="11" fill="var(--danger)"/>
  </g>

  <!-- eyebrow -->
  <text x="960" y="382" text-anchor="middle" class="mono" font-size="29" letter-spacing="10">
    <tspan class="danger">[</tspan><tspan class="ink2"> READ BEFORE YOU CONTINUE </tspan><tspan class="danger">]</tspan>
  </text>

  <!-- headline -->
  <text x="960" y="500" text-anchor="middle" class="mono ink0" font-size="112" font-weight="700" letter-spacing="-2">UE4SS NOT FOUND</text>
  <rect x="740" y="538" width="440" height="6" fill="var(--danger)"/>

  <!-- recommendation -->
  <text x="960" y="638" text-anchor="middle" class="sans ink1" font-size="44" font-weight="500">This mod needs UE4SS. The safe way is to install it yourself first:</text>
  <text x="960" y="712" text-anchor="middle" class="mono" font-size="42" font-weight="700">
    <tspan class="acc">github.com/UE4SS-RE/RE-UE4SS</tspan>
  </text>
  <text x="960" y="760" text-anchor="middle" class="mono ink2" font-size="28" letter-spacing="2">the experimental-latest build, the regular zip, not zDEV</text>

  <!-- consequence -->
  <text x="960" y="864" text-anchor="middle" class="sans danger" font-size="42" font-weight="700">If you let this installer bundle UE4SS,</text>
  <text x="960" y="916" text-anchor="middle" class="sans ink1" font-size="38" font-weight="500">it is REMOVED when you uninstall this mod, which can break other UE4SS mods.</text>

  <!-- footer -->
  <rect x="130" y="986" width="1660" height="1" fill="var(--hairline)"/>
  <text x="960" y="1032" text-anchor="middle" class="mono ink2" font-size="28">
    <tspan class="danger">[ </tspan>Tick the box only if you understand and accept this<tspan class="danger"> ]</tspan>
  </text>
</svg>
</body>
</html>
